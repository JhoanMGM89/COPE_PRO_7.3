<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Empaquetar Proyecto</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        background: #0a0a0a;
        color: white;
        font-family: 'Segoe UI', sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        flex-direction: column;
        gap: 20px;
    }
    h1 { font-size: 1.5rem; }
    .status { color: #888; font-size: 0.9rem; }
    .btn {
        padding: 15px 40px;
        background: #007bff;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
    }
    .btn:hover { background: #0056b3; transform: translateY(-2px); }
    .btn:disabled { background: #555; cursor: wait; }
    .progress { color: #22c55e; font-size: 0.85rem; margin-top: 10px; }
</style>
</head>
<body>

<h1>📦 Empaquetar Proyecto</h1>
<p class="status">Empaqueta toda la aplicación en un solo archivo HTML descargable</p>
<button class="btn" id="btnDescargar" onclick="empaquetar()">⬇️ DESCARGAR TODO EN 1 HTML</button>
<div id="progreso" class="progress"></div>

<script>
async function empaquetar() {
    const btn = document.getElementById('btnDescargar');
    const progreso = document.getElementById('progreso');
    btn.disabled = true;
    btn.textContent = '⏳ Empaquetando...';

    const modulos = [
        'AVERIAS.html',
        'ATP.html',
        'SERVICE_NOW.html',
        'PUTTY.html',
        'GENERADOR_DE_PLANTILLAS.html'
    ];

    const contenidos = {};

    for (let i = 0; i < modulos.length; i++) {
        progreso.textContent = `Cargando ${modulos[i]}... (${i+1}/${modulos.length})`;
        try {
            const resp = await fetch('/modules/' + modulos[i]);
            contenidos[modulos[i]] = await resp.text();
        } catch(e) {
            progreso.textContent = `Error cargando ${modulos[i]}: ${e.message}`;
            btn.disabled = false;
            btn.textContent = '⬇️ DESCARGAR TODO EN 1 HTML';
            return;
        }
    }

    progreso.textContent = 'Integrando módulos nativamente...';

    let mainHTML = contenidos['GENERADOR_DE_PLANTILLAS.html'];

    // =============================================
    // PASO 1: Codificar módulos en Base64
    // =============================================
    const moduleData = {};
    for (const mod of modulos) {
        if (mod !== 'GENERADOR_DE_PLANTILLAS.html') {
            try {
                // Codificación más robusta
                moduleData[mod] = btoa(encodeURIComponent(contenidos[mod]).replace(/%([0-9A-F]{2})/g, (match, p1) => String.fromCharCode(parseInt(p1, 16))));
            } catch(e) {
                console.error('Error encoding module:', mod, e);
                moduleData[mod] = btoa(contenidos[mod]); // fallback
            }
        }
    }

    // =============================================
    // PASO 2: Insertar almacén de módulos como variable JS
    //         directamente DENTRO de la función abrirModulo
    // =============================================
    // Reemplazar "iframe.src = modulo;" por lógica que use módulos embebidos
    // Hay 2 ocurrencias: una para nestedIframe y otra para iframe principal

    const loadLogic = `// --- MÓDULOS EMBEBIDOS (integrado nativamente) ---
        var __mod = typeof __modulosEmbebidos !== 'undefined' ? __modulosEmbebidos[modulo] : null;
        if (__mod) {
            try {
                var decoded = atob(__mod);
                var __html = decodeURIComponent(decoded.split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));
                IFRAME_VAR.srcdoc = __html;
            } catch(e) {
                console.error('Error loading embedded module:', modulo, e);
                IFRAME_VAR.src = modulo;
            }
        } else {
            IFRAME_VAR.src = modulo;
        }`;

    // Reemplazar TODAS las ocurrencias de nestedIframe.src = modulo;
    mainHTML = mainHTML.replaceAll(
        'nestedIframe.src = modulo;',
        loadLogic.replace(/IFRAME_VAR/g, 'nestedIframe')
    );

    // Reemplazar TODAS las ocurrencias de iframe.src = modulo;
    mainHTML = mainHTML.replaceAll(
        'iframe.src = modulo;',
        loadLogic.replace(/IFRAME_VAR/g, 'iframe')
    );

    // =============================================
    // PASO 3: Inyectar la variable __modulosEmbebidos
    //         justo antes de "let moduleStack" (inicio de la sección de módulos)
    // =============================================
    const dataDeclaration = `// ============================================
// MÓDULOS EMBEBIDOS (integrado nativamente para uso offline)
// ============================================
var __modulosEmbebidos = JSON.parse(decodeURIComponent("${encodeURIComponent(JSON.stringify(moduleData))}"));

`;

    mainHTML = mainHTML.replace(
        'let moduleStack = [];',
        dataDeclaration + 'let moduleStack = [];'
    );

    // =============================================
    // PASO 4: Descargar archivo final limpio
    // =============================================
    const blob = new Blob([mainHTML], { type: 'text/html;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = 'Generador_de_Plantillas_Pro_v4.0.html';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);

    progreso.textContent = '✅ ¡Archivo descargado exitosamente! (Sin parches, 100% integrado)';
    btn.disabled = false;
    btn.textContent = '⬇️ DESCARGAR TODO EN 1 HTML';
}
</script>

</body>
</html>
